name: Android Build   # 工作流名称

on:
  push:
    branches: [ "master" ]   # 推送到 master 分支时触发
  pull_request:
    branches: [ "master" ]   # 向 master 分支发起 PR 时触发
  workflow_dispatch:         # 允许手动触发

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest    # 使用最新的 Ubuntu 运行器

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 JDK 环境
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin' # 使用 Eclipse Temurin 发行版

      # 3. 设置 Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'    # 建议与你的项目 gradle-wrapper.properties 版本保持一致

      # 4. 赋予 gradlew 执行权限并编译
      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      # 5. 上传编译好的 APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HookGG-debug
          path: app/build/outputs/apk/debug/*.apk
